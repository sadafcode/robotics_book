name: Sync Backend to HuggingFace Spaces

on:
  push:
    branches:
      - master
      - 003-auth-jwt

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://sadafcode:$HF_TOKEN@huggingface.co/spaces/sadafcode/physical-ai-backend
          git push space HEAD:main --force
