name: Sync Backend to HuggingFace Spaces

on:
  push:
    branches:
      - master
      - 003-auth-jwt

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload backend to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])

          api.upload_folder(
              folder_path="backend",
              repo_id="Sadafawad/physical-ai-backend",
              repo_type="space",
          )

          api.upload_file(
              path_or_fileobj="README.md",
              path_in_repo="README.md",
              repo_id="Sadafawad/physical-ai-backend",
              repo_type="space",
          )

          print("Upload complete!")
          EOF
