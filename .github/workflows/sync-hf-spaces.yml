name: Sync Backend to HuggingFace Spaces

on:
  push:
    branches:
      - master
      - 003-auth-jwt

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Copy only backend files to a clean deploy directory
          mkdir hf-deploy
          cp -r backend/* hf-deploy/
          cp README.md hf-deploy/

          cd hf-deploy
          git init
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Deploy backend to HuggingFace Spaces"
          git push https://Sadafawad:$HF_TOKEN@huggingface.co/spaces/Sadafawad/physical-ai-backend main --force
